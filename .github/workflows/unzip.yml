name: Giải nén toàn bộ ThunderHack

on:
  workflow_dispatch:
  push:
    paths:
      - 'ThunderHack-Recode-latest.zip'

jobs:
  unzip-full:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Lấy code
        uses: actions/checkout@v4

      - name: Giải nén toàn bộ file zip
        run: |
          ZIP_FILE="ThunderHack-Recode-latest.zip"
          
          if [ -f "$ZIP_FILE" ]; then
            echo "Đang giải nén toàn bộ: $ZIP_FILE"
            unzip -o "$ZIP_FILE"
            echo "Giai nen hoan tat!"
            ls -la
          else
            echo "Khong tim thay file $ZIP_FILE"
            exit 1
          fi

      - name: Xoa file workflow bi trung (neu co)
        run: |
          # Xoa file workflow do git pull ve de tranh conflict
          rm -f .github/workflows/gradle.yml 2>/dev/null || true
          rm -f .github/workflows/unzip.yml 2>/dev/null || true

      - name: Commit va push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto unzip ThunderHack full"
          git push
