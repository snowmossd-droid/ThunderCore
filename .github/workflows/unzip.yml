name: Giải nén ThunderHack

on:
  workflow_dispatch:  👈 DÒNG NÀY LÀ QUAN TRỌNG NHẤT
  push:
    paths:
      - 'ThunderHack-Recode-latest.zip'

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Lấy code
        uses: actions/checkout@v4

      - name: Giải nén file zip
        run: |
          if [ -f "ThunderHack-Recode-latest.zip" ]; then
            echo "📦 Đang giải nén..."
            unzip -o "ThunderHack-Recode-latest.zip"
            echo "✅ Giải nén thành công!"
          else
            echo "❌ Không tìm thấy file zip"
            exit 1
          fi

      - name: Commit và push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto unzip ThunderHack-Recode"
          git push
